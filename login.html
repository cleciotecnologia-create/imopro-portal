<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImóPro — Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#1a3a5c 0%,#0f4c75 60%,#1a3a5c 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px 36px;max-width:400px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.3);text-align:center}
.logo-wrap{margin-bottom:24px}
.logo{font-size:52px;display:block;margin-bottom:10px}
.brand{font-size:28px;font-weight:800;color:#1a3a5c}
.brand span{color:#e8a020}
.tagline{font-size:13px;color:#718096;margin-top:4px}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#a0aec0;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;color:#1a202c;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-google:hover{border-color:#4285f4;background:#f0f4ff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(66,133,244,.2)}
.btn-google img{width:22px;height:22px}
.btn-email{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:10px;border:none;background:#1a3a5c;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:10px}
.btn-email:hover{background:#0f2744;transform:translateY(-1px)}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;text-align:left}
.form-group label{font-size:11px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px}
.form-group input{padding:11px 13px;border-radius:9px;border:1.5px solid #e2e8f0;font-size:13px;color:#1a202c;transition:border-color .2s}
.form-group input:focus{outline:none;border-color:#1a3a5c}
.btn-submit{width:100%;padding:13px;border-radius:10px;border:none;background:#e8a020;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-submit:hover{background:#c8881a;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.link-toggle{font-size:12px;color:#718096;margin-top:16px;cursor:pointer}
.link-toggle span{color:#1a3a5c;font-weight:700;text-decoration:underline;cursor:pointer}
.error-box{background:#fcebeb;border:1px solid #f5a0a0;color:#a32d2d;border-radius:8px;padding:10px 13px;font-size:12px;margin-bottom:12px;display:none;text-align:left}
.success-box{background:#e8f8f0;border:1px solid #a3d9b8;color:#0f6e56;border-radius:8px;padding:10px 13px;font-size:12px;margin-bottom:12px;display:none;text-align:left}
.loading-overlay{position:fixed;inset:0;background:rgba(26,58,92,.85);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
.loading-overlay.show{display:flex}
.spinner-big{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);border-top-color:#e8a020;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:#fff;font-size:14px;font-weight:600}
.user-card{display:none;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:16px;align-items:center;gap:12px;text-align:left}
.user-card.show{display:flex}
.user-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid #e8a020}
.user-avatar-text{width:44px;height:44px;border-radius:50%;background:#1a3a5c;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.user-name{font-weight:700;font-size:14px;color:#1a202c}
.user-email{font-size:11px;color:#718096}
.user-role{font-size:10px;background:#e8f8f0;color:#0f6e56;border-radius:20px;padding:2px 8px;font-weight:700;margin-top:3px;display:inline-block}
.btn-portal{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#1a3a5c,#0f4c75);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none;margin-top:8px}
.btn-portal:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,58,92,.4)}
.btn-sair{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;color:#718096;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .2s}
.btn-sair:hover{border-color:#e17055;color:#e17055}
.tabs-auth{display:flex;gap:0;margin-bottom:20px;border-radius:10px;overflow:hidden;border:1px solid #e2e8f0}
.tab-auth{flex:1;padding:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:#f8fafc;color:#718096;transition:all .2s}
.tab-auth.on{background:#1a3a5c;color:#fff}
.forgot{font-size:11px;color:#718096;text-align:right;margin-top:-6px;margin-bottom:10px;cursor:pointer}
.forgot span{color:#1a3a5c;text-decoration:underline}
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading">
  <div class="spinner-big"></div>
  <div class="loading-txt" id="loading-txt">Entrando...</div>
</div>

<div class="card">
  <!-- LOGO -->
  <div class="logo-wrap">
    <span class="logo">🏢</span>
    <div class="brand">Imó<span>Pro</span></div>
    <div class="tagline">Portal Imobiliário Completo</div>
  </div>

  <!-- USUÁRIO LOGADO -->
  <div class="user-card" id="user-card">
    <div class="user-avatar-text" id="user-avatar-text">?</div>
    <div>
      <div class="user-name" id="user-name">—</div>
      <div class="user-email" id="user-email">—</div>
      <div class="user-role" id="user-role">Usuário</div>
    </div>
  </div>

  <div id="painel-logado" style="display:none">
    <a href="ImoPro_Portal.html" class="btn-portal">
      <i class="ti ti-building-estate"></i> Acessar Portal ImóPro
    </a>
    <button class="btn-sair" onclick="sair()">
      <i class="ti ti-logout"></i> Sair da conta
    </button>
  </div>

  <div id="painel-login">
    <!-- GOOGLE -->
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="22" height="22" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Entrar com Google
    </button>

    <div class="divider">ou</div>

    <!-- TABS EMAIL/CADASTRO -->
    <div class="tabs-auth">
      <button class="tab-auth on" id="tab-entrar" onclick="switchTab('entrar')">Entrar</button>
      <button class="tab-auth" id="tab-cadastrar" onclick="switchTab('cadastrar')">Cadastrar</button>
    </div>

    <div id="error-box" class="error-box"></div>
    <div id="success-box" class="success-box"></div>

    <!-- FORM ENTRAR -->
    <div id="form-entrar">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')loginEmail()">
      </div>
      <div class="forgot" onclick="recuperarSenha()">Esqueceu a senha? <span>Recuperar acesso</span></div>
      <button class="btn-submit" id="btn-entrar" onclick="loginEmail()">
        <i class="ti ti-login"></i> Entrar
      </button>
    </div>

    <!-- FORM CADASTRAR -->
    <div id="form-cadastrar" style="display:none">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" id="cad-nome" placeholder="Seu nome">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="cad-email" placeholder="seu@email.com">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label>Confirmar senha</label>
        <input type="password" id="cad-senha2" placeholder="Repita a senha" onkeydown="if(event.key==='Enter')cadastrar()">
      </div>
      <button class="btn-submit" id="btn-cadastrar" onclick="cadastrar()">
        <i class="ti ti-user-plus"></i> Criar conta
      </button>
    </div>
  </div><!-- /painel-login -->

  <div style="margin-top:20px;font-size:11px;color:#a0aec0">
    🔒 Acesso seguro via Firebase Authentication<br>
    <span id="domain-info" style="color:#cbd5e0"></span>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getAuth, signInWithPopup, GoogleAuthProvider,
  signInWithEmailAndPassword, createUserWithEmailAndPassword,
  onAuthStateChanged, signOut, sendPasswordResetEmail, updateProfile
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDEa19EQxhpxNNDJyxdlC48kfoP0BQtHso",
  authDomain: "imopro-portal.firebaseapp.com",
  projectId: "imopro-portal",
  storageBucket: "imopro-portal.firebasestorage.app",
  messagingSenderId: "251931175141",
  appId: "1:251931175141:web:3825de4996e9eb565a8c0c"
};

// Admin autorizado
const ADMIN_EMAIL = "cleciotecnologia@gmail.com";

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

document.getElementById('domain-info').textContent = window.location.hostname;

// ===== HELPERS =====
function showLoading(txt='Entrando...') {
  document.getElementById('loading-txt').textContent = txt;
  document.getElementById('loading').classList.add('show');
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = '⚠️ ' + msg; el.style.display='block';
  document.getElementById('success-box').style.display='none';
  setTimeout(()=>el.style.display='none', 5000);
}
function showSuccess(msg) {
  const el = document.getElementById('success-box');
  el.textContent = '✅ ' + msg; el.style.display='block';
  document.getElementById('error-box').style.display='none';
  setTimeout(()=>el.style.display='none', 4000);
}

function traduzirErro(code) {
  const erros = {
    'auth/user-not-found':'E-mail não cadastrado.',
    'auth/wrong-password':'Senha incorreta.',
    'auth/email-already-in-use':'E-mail já cadastrado.',
    'auth/weak-password':'Senha muito fraca. Use pelo menos 6 caracteres.',
    'auth/invalid-email':'E-mail inválido.',
    'auth/popup-closed-by-user':'Login cancelado.',
    'auth/network-request-failed':'Sem conexão. Verifique a internet.',
    'auth/too-many-requests':'Muitas tentativas. Aguarde alguns minutos.',
    'auth/invalid-credential':'E-mail ou senha incorretos.',
    'auth/popup-blocked':'Popup bloqueado. Permita popups no navegador.',
  };
  return erros[code] || 'Erro: ' + code;
}

// ===== SALVAR USUÁRIO NO FIRESTORE =====
async function salvarUsuario(user) {
  const role = user.email === ADMIN_EMAIL ? 'admin' : 'usuario';
  const ref = doc(db, 'usuarios', user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      uid: user.uid,
      nome: user.displayName || user.email.split('@')[0],
      email: user.email,
      foto: user.photoURL || null,
      role,
      criadoEm: serverTimestamp(),
      ultimoLogin: serverTimestamp()
    });
  } else {
    await setDoc(ref, { ultimoLogin: serverTimestamp() }, { merge: true });
  }
  return role;
}

// ===== MOSTRAR PERFIL =====
async function mostrarUsuario(user) {
  const role = await salvarUsuario(user);
  const nome = user.displayName || user.email.split('@')[0];
  const inicial = nome.charAt(0).toUpperCase();
  document.getElementById('user-name').textContent = nome;
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('user-role').textContent = role === 'admin' ? '👑 Admin' : '👤 Usuário';
  document.getElementById('user-avatar-text').textContent = inicial;
  if (user.photoURL) {
    document.getElementById('user-avatar-text').innerHTML = `<img src="${user.photoURL}" class="user-avatar" style="width:44px;height:44px;border-radius:50%;border:2px solid #e8a020">`;
  }
  document.getElementById('user-card').classList.add('show');
  document.getElementById('painel-logado').style.display = 'block';
  document.getElementById('painel-login').style.display  = 'none';
}

// ===== AUTH STATE =====
onAuthStateChanged(auth, async user => {
  if (user) {
    await mostrarUsuario(user);
    hideLoading();
    // Se já logado, redirecionar automaticamente após 1.5s
    setTimeout(() => {
      window.location.href = 'ImoPro_Portal.html';
    }, 1500);
  } else {
    document.getElementById('user-card').classList.remove('show');
    document.getElementById('painel-logado').style.display = 'none';
    document.getElementById('painel-login').style.display  = 'block';
    hideLoading();
  }
});

// ===== LOGIN GOOGLE =====
window.loginGoogle = async () => {
  showLoading('Conectando com Google...');
  try {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ login_hint: ADMIN_EMAIL });
    const result = await signInWithPopup(auth, provider);
    await mostrarUsuario(result.user);
    showSuccess('Login realizado! Redirecionando...');
  } catch(e) {
    hideLoading();
    showError(traduzirErro(e.code));
  }
};

// ===== LOGIN EMAIL =====
window.loginEmail = async () => {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  if (!email || !senha) { showError('Preencha e-mail e senha.'); return; }
  const btn = document.getElementById('btn-entrar');
  btn.disabled=true; btn.innerHTML='<span style="display:inline-flex;gap:6px;align-items:center"><span style="width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block"></span> Entrando...</span>';
  showLoading('Verificando credenciais...');
  try {
    await signInWithEmailAndPassword(auth, email, senha);
  } catch(e) {
    hideLoading();
    showError(traduzirErro(e.code));
    btn.disabled=false; btn.innerHTML='<i class="ti ti-login"></i> Entrar';
  }
};

// ===== CADASTRAR =====
window.cadastrar = async () => {
  const nome  = document.getElementById('cad-nome').value.trim();
  const email = document.getElementById('cad-email').value.trim();
  const senha = document.getElementById('cad-senha').value;
  const senha2= document.getElementById('cad-senha2').value;
  if (!nome||!email||!senha) { showError('Preencha todos os campos.'); return; }
  if (senha !== senha2) { showError('As senhas não coincidem.'); return; }
  if (senha.length < 6)  { showError('Senha deve ter no mínimo 6 caracteres.'); return; }
  const btn = document.getElementById('btn-cadastrar');
  btn.disabled=true; btn.innerHTML='<span style="display:inline-flex;gap:6px;align-items:center"><span style="width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block"></span> Criando conta...</span>';
  showLoading('Criando sua conta...');
  try {
    const result = await createUserWithEmailAndPassword(auth, email, senha);
    await updateProfile(result.user, { displayName: nome });
    await salvarUsuario({ ...result.user, displayName: nome });
    showSuccess('Conta criada com sucesso!');
  } catch(e) {
    hideLoading();
    showError(traduzirErro(e.code));
    btn.disabled=false; btn.innerHTML='<i class="ti ti-user-plus"></i> Criar conta';
  }
};

// ===== RECUPERAR SENHA =====
window.recuperarSenha = async () => {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showError('Digite seu e-mail para recuperar a senha.'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showSuccess('E-mail de recuperação enviado para ' + email);
  } catch(e) { showError(traduzirErro(e.code)); }
};

// ===== SAIR =====
window.sair = async () => {
  showLoading('Saindo...');
  await signOut(auth);
  hideLoading();
};

// ===== TABS =====
window.switchTab = (tab) => {
  document.getElementById('tab-entrar').className    = 'tab-auth' + (tab==='entrar'?' on':'');
  document.getElementById('tab-cadastrar').className = 'tab-auth' + (tab==='cadastrar'?' on':'');
  document.getElementById('form-entrar').style.display    = tab==='entrar'?'block':'none';
  document.getElementById('form-cadastrar').style.display = tab==='cadastrar'?'block':'none';
  document.getElementById('error-box').style.display   = 'none';
  document.getElementById('success-box').style.display = 'none';
};
</script>
</body>
</html>
