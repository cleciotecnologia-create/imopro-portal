<!DOCTYPE html>

<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a3a5c;display:flex;align-items:center;justify-content:center;height:100vh;color:#fff}
.box{text-align:center}
.logo{font-size:48px;margin-bottom:16px}
h1{font-size:28px;font-weight:700;margin-bottom:8px}

a{background:#e8a020;color:#fff;padding:12px 28px;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px}
.spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,.2);border-top-color:#e8a020;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
